name: Code Metrics

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Test Coverage Report ──────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://localhost:27017/taskpulse_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_for_ci_pipeline_only_32chars
      PORT: 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --coverageReporters=text --coverageReporters=json-summary | tee coverage-output.txt

      - name: Post coverage comment
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');

            let coverageSummary = 'No coverage data available';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              coverageSummary = [
                '| Metric | Coverage |',
                '|--------|----------|',
                `| **Statements** | ${total.statements.pct}% |`,
                `| **Branches** | ${total.branches.pct}% |`,
                `| **Functions** | ${total.functions.pct}% |`,
                `| **Lines** | ${total.lines.pct}% |`,
              ].join('\n');
            } catch (e) {
              coverageSummary = '_No coverage summary generated. Add tests to see coverage metrics._';
            }

            const body = [
              '## 📊 Code Coverage Report',
              '',
              coverageSummary,
              '',
              '_Generated by CI — coverage thresholds not enforced yet._'
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('📊 Code Coverage Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─── Dependency Size ───────────────────────────────────────────────
  dependency-metrics:
    name: Dependency Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Report dependency metrics
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        with:
          script: |
            const { execSync } = require('child_process');

            // Count dependencies
            const pkg = require('./package.json');
            const prodDeps = Object.keys(pkg.dependencies || {}).length;
            const devDeps = Object.keys(pkg.devDependencies || {}).length;

            // Get node_modules size
            const duOutput = execSync('du -sh node_modules').toString().trim();
            const nodeModulesSize = duOutput.split('\t')[0];

            // Get outdated packages
            let outdated = 'All packages up to date ✅';
            try {
              execSync('npm outdated --json', { encoding: 'utf8' });
            } catch (e) {
              const outdatedJson = JSON.parse(e.stdout || '{}');
              const count = Object.keys(outdatedJson).length;
              if (count > 0) {
                outdated = `**${count} packages** have updates available`;
              }
            }

            const body = [
              '## 📦 Dependency Metrics',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Production deps | ${prodDeps} |`,
              `| Dev deps | ${devDeps} |`,
              `| node_modules size | ${nodeModulesSize} |`,
              `| Outdated packages | ${outdated} |`,
              '',
              '_Run `npm outdated` locally for details._'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('📦 Dependency Metrics'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─── PR Size Labels ───────────────────────────────────────────────
  pr-size:
    name: PR Size Label
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Label PR by size
        uses: actions/github-script@v9
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const changes = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            let label;
            if (changes < 50) label = 'size/S';
            else if (changes < 200) label = 'size/M';
            else if (changes < 500) label = 'size/L';
            else label = 'size/XL';

            // Remove existing size labels
            const existingLabels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })).data;

            for (const l of existingLabels.filter(l => l.name.startsWith('size/'))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: l.name,
              });
            }

            // Ensure label exists, then apply
            const sizeLabels = {
              'size/S': '0e8a16',
              'size/M': 'fbca04',
              'size/L': 'eb6420',
              'size/XL': 'b60205',
            };

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: sizeLabels[label],
                description: `PR size: ${label.split('/')[1]}`,
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label],
            });

            core.info(`PR labeled as ${label} (${changes} lines changed)`);

  # ─── Code Complexity ──────────────────────────────────────────────
  complexity:
    name: Code Complexity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Analyze complexity
        run: |
          npx cr src --format json > complexity-report.json || true
          echo "## Complexity Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npx cr src --format text >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "_Complexity analysis completed. See artifact for details._" >> $GITHUB_STEP_SUMMARY

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complexity-report
          path: complexity-report.json
          retention-days: 14
